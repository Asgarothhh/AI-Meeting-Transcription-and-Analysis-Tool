device: "cuda"
batch_size: 16
compute_type: "float16"
language: null

models:
  whisper: "medium"

paths:
  output_dir: "outputs"
  temp_dir: "temp"
  model_dir: "models"
  hf_cache: "models/huggingface"
  torch_cache: "models/torch"
  whisper_cache: "models/whisper"

features:
  enable_summarization: true
  enable_word_timestamps: true

diarization:
  # Для типичного диалога "интервью/разговор 1-на-1" фиксируем двух спикеров.
  # Если нужно автоопределение, установите num_speakers: null
  num_speakers: 2
  min_speakers: null
  max_speakers: null